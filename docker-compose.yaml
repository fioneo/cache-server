services:
  db:
    image: postgres:18.1-bookworm
    container_name: alerts-postgres
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always
  redis:
    image: redis:8.2.7-bookworm
    container_name: alerts-redis
    ports:
      - "6379:6379"
    restart: always
